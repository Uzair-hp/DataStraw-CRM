<html lang="en">

            <!-- Search & Filters -->
<div

</div>
          

            <!-- Ticket List -->

</p>

<p

<!-- Resolution Notes -->

</div>

<!-- New Ticket Modal -->
<div
    id="newTicketModal"

>

    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl flex flex-col">

        <!-- Modal Header -->

                    </div>

                </div>

                <!-- Ticket Info -->
                <div class="grid grid-cols-2 gap-4 mb-4">

                    <div>

                        <label class="block text-sm font-semibold mb-1">

                        <select
                            id="issueTheme"

                        >

                            <option value="">

                            </option>

                            <option value="Billing">
                                Billing
                            </option>

                            <option value="Delivery">
                                Delivery / Shipping
                            </option>

                                Product Defect
                            </option>

                                General Inquiry

                    </div>

                            Channel *
                        </label>

                        <select
                            id="channel"
                            required

                        >

                                Email
                            </option>

                            <option value="WhatsApp">

                            </option>

                                Phone Call

                </div>

                <!-- Description -->

                <!-- Buttons -->
                <div class="flex justify-end gap-2 mt-6">

                    <button

                        Cancel

                    <button
                        type="submit"

                        Create Ticket

            </form>

        </div>

    </div>

</div>
    <!-- ================= SCRIPT ================= -->
   <script>

    // Global ticket storage
    let allTickets = [];

    // Load tickets on page load
    document.addEventListener(
        "DOMContentLoaded",
        loadTickets
    );

    function loadTickets() {

        google.script.run
            .withSuccessHandler(renderTicketList)
            .withFailureHandler(handleError)
            .getTickets();

    }

    // Render ticket list
   function renderTicketList(jsonString) {

    try {

        allTickets = JSON.parse(jsonString);

        // Draw tickets
        displayTickets(allTickets);

    } catch (e) {

        handleError(
            "Error parsing data: " + e.message
        );

    }

}

// Draw tickets to screen
function displayTickets(ticketsToDisplay) {

    const container =
        document.getElementById('ticketListContainer');

    if (ticketsToDisplay.length === 0) {

        container.innerHTML = `
            <div class="p-4 text-center text-gray-500">

                No tickets match your search.

            </div>
        `;

        return;

    }

    let html = '';

    ticketsToDisplay.forEach(ticket => {

        let statusColor =
            "bg-gray-200 text-gray-800";

        if (ticket.Status === 'Pending') {

            statusColor =
                "bg-yellow-200 text-yellow-800";

        }

        if (ticket.Status === 'In Progress') {

            statusColor =
                "bg-blue-200 text-blue-800";

        }

        if (ticket.Status === 'Waiting on Customer') {

            statusColor =
                "bg-orange-200 text-orange-800";

        }

        if (ticket.Status === 'Resolved') {

            statusColor =
                "bg-green-200 text-green-800";

        }

        html += `

            <div
                class="p-3 mb-2 bg-white border border-gray-200 rounded shadow-sm hover:shadow-md cursor-pointer transition"
                onclick="viewTicket('${ticket.TicketID}')"
            >

                <div class="flex justify-between items-start mb-1">

                    <span class="font-bold text-blue-800">
                        ${ticket.TicketID}
                    </span>

                    <span class="text-xs px-2 py-1 rounded-full ${statusColor}">
                        ${ticket.Status}
                    </span>

                </div>

                <div class="text-sm font-semibold text-gray-800">
                    ${ticket.CustomerName}
                </div>

                <div class="text-xs text-gray-500 truncate">
                    ${ticket.Channel || 'Email'} | ${ticket.IssueTheme}
                </div>

            </div>

        `;

    });

    container.innerHTML = html;

}

// Filter tickets
function filterTickets() {

    const searchTerm =
        document.getElementById('searchInput')
        .value
        .toLowerCase();

    const statusFilter =
        document.getElementById('statusFilter').value;

    const channelFilter =
        document.getElementById('channelFilter').value;

    const filtered = allTickets.filter(ticket => {

        // Search match
        const matchesSearch =

            (ticket.TicketID &&
                ticket.TicketID
                    .toLowerCase()
                    .includes(searchTerm))

            ||

            (ticket.CustomerName &&
                ticket.CustomerName
                    .toLowerCase()
                    .includes(searchTerm))

            ||

            (ticket.Email &&
                ticket.Email
                    .toLowerCase()
                    .includes(searchTerm))

            ||

            (ticket.Phone &&
                ticket.Phone
                    .toString()
                    .includes(searchTerm))

            ||

            (ticket.OrderID &&
                ticket.OrderID
                    .toString()
                    .toLowerCase()
                    .includes(searchTerm));

        // Status filter
        let matchesStatus = true;

        if (statusFilter === 'Active') {

            matchesStatus =
                (ticket.Status !== 'Resolved');

        } else if (statusFilter !== 'All') {

            matchesStatus =
                (ticket.Status === statusFilter);

        }

        // Channel filter
        let matchesChannel = true;

        if (channelFilter !== 'All') {

            matchesChannel =
                (ticket.Channel === channelFilter);

        }

        return (
            matchesSearch &&
            matchesStatus &&
            matchesChannel
        );

    });

    displayTickets(filtered);

}

    // Show selected ticket details
    let currentlySelectedTicketId = null;

    function viewTicket(ticketId) {

        currentlySelectedTicketId = ticketId;

        const ticket = allTickets.find(
            t => t.TicketID === ticketId
        );

        if (!ticket) return;

        document
            .getElementById('noTicketSelected')
            .classList.add('hidden');

        document
            .getElementById('ticketDetailContainer')
            .classList.remove('hidden');

        document.getElementById('detail-id').innerText =
            ticket.TicketID;

        document.getElementById('detail-customer').innerText =
            `${ticket.CustomerName} (${ticket.Email})`;

        // Status Dropdown
        const statusContainer =
            document.getElementById('detail-status');

        statusContainer.innerHTML = `
            <select
                id="updateStatusSelect"
                class="border border-gray-300 rounded p-1 text-sm bg-white"
            >

                <option
                    value="Pending"
                    ${ticket.Status === 'Pending' ? 'selected' : ''}
                >
                    Pending
                </option>

                <option
                    value="In Progress"
                    ${ticket.Status === 'In Progress' ? 'selected' : ''}
                >
                    In Progress
                </option>

                <option
                    value="Waiting on Customer"
                    ${ticket.Status === 'Waiting on Customer' ? 'selected' : ''}
                >
                    Waiting on Customer
                </option>

                <option
                    value="Waiting on Third Party"
                    ${ticket.Status === 'Waiting on Third Party' ? 'selected' : ''}
                >
                    Waiting on Third Party
                </option>

                <option
                    value="Resolved"
                    ${ticket.Status === 'Resolved' ? 'selected' : ''}
                >
                    Resolved
                </option>

            </select>
        `;

        document.getElementById('detail-description').innerText =
            ticket.Description || 'No description provided.';

        document.getElementById('detail-notes').value =
     ticket.ResolutionNotes || '';

        // Update Button Logic
        const updateBtn =
            document.getElementById('updateBtn');

        const newUpdateBtn =
            updateBtn.cloneNode(true);

        updateBtn.parentNode.replaceChild(
            newUpdateBtn,
            updateBtn
        );


        newUpdateBtn.addEventListener('click', () => {

            const newStatus =
                document.getElementById('updateStatusSelect').value;

            saveStatusUpdate(
                ticketId,
                newStatus,
                newUpdateBtn
            );

        });

        const notesBtn =
    document.getElementById('saveNotesBtn');

const newNotesBtn =
    notesBtn.cloneNode(true);

notesBtn.parentNode.replaceChild(
    newNotesBtn,
    notesBtn
);

newNotesBtn.addEventListener('click', () => {

    const notesText =
        document.getElementById('detail-notes')
        .value;

    saveNotes(
        ticketId,
        notesText,
        newNotesBtn
    );

});
        const insightsContainer =
    document.getElementById('insightsContainer');

const noInsights =
    document.getElementById('noInsights');

// Show loading state
noInsights.classList.add('hidden');

insightsContainer.classList.remove('hidden');

insightsContainer.innerHTML = `
    <div class="text-center text-gray-500 mt-4">

        <i class="fa-solid fa-spinner fa-spin"></i>
        Loading order data...

    </div>
`;

// Check if ticket has Order ID
const orderId = ticket.OrderID;

if (!orderId || orderId.trim() === "") {

    insightsContainer.innerHTML = `
        <div class="p-4 bg-gray-100 rounded text-center text-gray-600">

            No Order ID associated with this ticket.

        </div>
    `;

    return;

}

// Fetch order data
google.script.run

    .withSuccessHandler((response) => {

        const res = JSON.parse(response);

        if (res.success) {

            const order = res.data;

            insightsContainer.innerHTML = `

                <div class="bg-blue-50 border border-blue-100 p-4 rounded shadow-sm mb-4">

                    <h3 class="font-bold text-blue-800 border-b border-blue-200 pb-2 mb-2">

                        Order Details: ${order.OrderID}

                    </h3>

                    <p class="mb-1">

                        <span class="font-semibold">
                            Product:
                        </span>

                        ${order.ProductName}

                    </p>

                    <p class="mb-1">

                        <span class="font-semibold">
                            Date:
                        </span>

                        ${new Date(order.OrderDate).toLocaleDateString()}

                    </p>

                    <p class="mb-1">

                        <span class="font-semibold">
                            Amount:
                        </span>

                        ${order.Amount}

                    </p>

                    <p class="mt-2">

                        <span class="px-2 py-1 bg-blue-200 text-blue-800 text-xs font-bold rounded">

                            ${order.ShippingStatus}

                        </span>

                    </p>

                </div>

            `;

        } else {

            insightsContainer.innerHTML = `
                <div class="p-4 bg-red-50 text-red-600 rounded border border-red-200">

                    ${res.error}

                </div>
            `;

        }

    })

    .withFailureHandler((error) => {

        insightsContainer.innerHTML = `
            <div class="text-red-500">

                Error loading insights.

            </div>
        `;

    })

    .getOrderDetails(orderId);

    }

    // Save Status Update
    function saveStatusUpdate(ticketId, newStatus, btnElement) {

        btnElement.disabled = true;
        btnElement.innerText = "Updating...";

        google.script.run

            .withSuccessHandler((response) => {

                const res = JSON.parse(response);

                if (res.success) {

                    btnElement.innerText = "Updated!";

                    setTimeout(() => {

                        btnElement.disabled = false;
                        btnElement.innerText = "Update Status";

                    }, 2000);

                    loadTickets();

                } else {

                    alert(res.error);

                    btnElement.disabled = false;
                    btnElement.innerText = "Update Status";

                }

            })

            .withFailureHandler((error) => {

                alert("Failed: " + error.message);

                btnElement.disabled = false;
                btnElement.innerText = "Update Status";

            })

            .updateTicketStatus(ticketId, newStatus);

    }

    function saveNotes(
    ticketId,
    notesText,
    btnElement
) {

    btnElement.disabled = true;

    btnElement.innerText = "Saving...";

    google.script.run

        .withSuccessHandler((response) => {

            const res =
                JSON.parse(response);

            if (res.success) {

                btnElement.innerText = "Saved!";

                setTimeout(() => {

                    btnElement.disabled = false;

                    btnElement.innerText =
                        "Save Notes";

                }, 2000);

                loadTickets();

            } else {

                alert(res.error);

                btnElement.disabled = false;

                btnElement.innerText =
                    "Save Notes";

            }

        })

        .withFailureHandler((error) => {

            alert(
                "Failed: " + error.message
            );

            btnElement.disabled = false;

            btnElement.innerText =
                "Save Notes";

        })

        .updateTicketNotes(
            ticketId,
            notesText
        );

}

    // Modal Controls
    function openNewTicketModal() {

        document
            .getElementById('newTicketModal')
            .classList.remove('hidden');

    }

    function closeModal() {

        document
            .getElementById('newTicketModal')
            .classList.add('hidden');

        document
            .getElementById('newTicketForm')
            .reset();

    }

    // Submit New Ticket
    function submitNewTicket(event) {

        event.preventDefault();

        const submitBtn =
            document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.innerText = "Saving...";

        const ticketData = {

            customerName:
                document.getElementById('customerName').value,

            email:
                document.getElementById('email').value,

            phone:
                document.getElementById('phone').value,

            orderId:
                document.getElementById('orderId').value,

            issueTheme:
                document.getElementById('issueTheme').value,

            channel:
                document.getElementById('channel').value,

            description:
                document.getElementById('description').value,

            priority: "Medium"

        };

        google.script.run

            .withSuccessHandler((response) => {

                closeModal();

                submitBtn.disabled = false;
                submitBtn.innerText = "Create Ticket";

                loadTickets();

            })

            .withFailureHandler((error) => {

                alert(
                    "Error saving ticket: " + error.message
                );

                submitBtn.disabled = false;
                submitBtn.innerText = "Create Ticket";

            })

            .createTicket(ticketData);

    }

    // Error Handler
    function handleError(error) {

        console.error(error);

        document.getElementById(
            'ticketListContainer'
        ).innerHTML = `
            <div class="p-4 text-center text-red-500">

                <i class="fa-solid fa-triangle-exclamation mb-2"></i>
                <br>

                Error loading data. Check console.

            </div>
        `;

    }

</script>
